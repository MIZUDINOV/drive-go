<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive GO - Preview Screen 02</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Unbounded:wght@500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-canvas" aria-label="Промо макет главной страницы Drive GO">
      <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
      <div class="bg-orb bg-orb-b" aria-hidden="true"></div>
      <div class="bg-orb bg-orb-c" aria-hidden="true"></div>

      <section class="hero-copy">
        <p class="hero-kicker">Browser Extension • Drive Workflow</p>
        <h1>
          Управление файлами<br />
          без лишних шагов
        </h1>
        <p class="hero-subtitle">
          Быстрый доступ, фильтры, поиск и сохранение контента в Google Drive
          прямо из боковой панели.
        </p>
      </section>

      <section class="workspace-scene" aria-label="Упрощенный интерфейс главной вкладки">
        <article class="workspace-shell">
          <div class="panel-layout">
            <aside class="sidebar-left">
              <img
                class="tab-logo"
                src="../../assets/gd-logo.svg"
                alt=""
                aria-hidden="true"
              />
              <button class="side-btn active" type="button">
                <span class="material-symbols-rounded">storage</span>
              </button>
              <button class="side-btn" type="button">
                <span class="material-symbols-rounded">schedule</span>
              </button>
              <button class="side-btn" type="button">
                <span class="material-symbols-rounded">people</span>
              </button>
              <button class="side-btn" type="button">
                <span class="material-symbols-rounded">star</span>
              </button>
              <button class="side-btn" type="button">
                <span class="material-symbols-rounded">notifications</span>
              </button>
              <button class="side-btn" type="button">
                <span class="material-symbols-rounded">sync_alt</span>
              </button>
              <button class="side-btn" type="button">
                <span class="material-symbols-rounded">delete</span>
              </button>
            </aside>

            <section class="content-main">
              <header class="topbar">
                <h2>Drive GO</h2>
                <div class="search-mock">
                  <span class="material-symbols-rounded">search</span>
                  <span>Поиск по файлам и папкам</span>
                </div>
              </header>

              <div class="filter-row" aria-hidden="true">
                <span class="pill"></span>
                <span class="pill"></span>
                <span class="pill short"></span>
              </div>

              <div class="skeleton-grid" aria-hidden="true">
                <div class="tile-skeleton big"></div>
                <div class="tile-skeleton"></div>
                <div class="tile-skeleton"></div>
                <div class="tile-skeleton"></div>
                <div class="tile-skeleton"></div>
                <div class="tile-skeleton"></div>
              </div>
            </section>
          </div>
        </article>

        <div class="floating-icons" aria-hidden="true">
          <div class="burst-card" style="--x: -86px; --y: -134px; --s: 0.62; --r: -26deg; --ry: 28deg; --d: -0.2s;">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M10,4H4C2.9,4,2.01,4.9,2.01,6L2,18c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V8c0-1.1-0.9-2-2-2h-8L10,4z" fill="#fbbc04" />
            </svg>

          </div>

            <svg viewBox="0 0 16 16" aria-hidden="true">

              <path fill="#7b1fa2" d="M14.222 0H1.778C.8 0 0 .8 0 1.778v12.444C0 15.2.8 16 1.778 16h12.444C15.2 16 16 15.2 16 14.222V1.778C16 .8 15.2 0 14.222 0zM5.333 12.444H3.556v-1.777h1.777v1.777zm0-3.555H3.556V7.11h1.777V8.89zm0-3.556H3.556V3.556h1.777v1.777zm7.111 7.111H6.222v-1.777h6.222v1.777zm0-3.555H6.222V7.11h6.222V8.89zm0-3.556H6.222V3.556h6.222v1.777z" />

            </svg>
            <span>AUDIO</span>
          </div>

          <div class="burst-card" style="--x: -124px; --y: 150px; --s: 1.48; --r: -20deg; --ry: 26deg; --d: -2.9s;">
            <svg viewBox="0 -2 16 16" aria-hidden="true">

          </div>

          <div class="burst-card" style="--x: -188px; --y: 74px; --s: 1.56; --r: -26deg; --ry: 30deg; --d: -0.9s;">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path fill="#1a73e8" d="M5.778 5.803v4.392L9.333 8 5.778 5.803z" />

          </div>

            <svg viewBox="-2 0 16 16" aria-hidden="true">
              <path fill="#5f6368" d="M8 0H1.6C.72 0 .008.72.008 1.6L0 14.4c0 .88.712 1.6 1.592 1.6H11.2c.88 0 1.6-.72 1.6-1.6V4.8L8 0zm1.6 12.8H3.2v-1.6h6.4v1.6zm0-3.2H3.2V8h6.4v1.6zm-2.4-4V1.2l4.4 4.4H7.2z" />

          <div class="burst-card" style="--x: -96px; --y: -170px; --s: 1.94; --r: -24deg; --ry: 30deg; --d: -3.1s;">
            <svg viewBox="-2 0 16 16" aria-hidden="true">
              <path fill="#5f6368" d="M8 0H1.6C.72 0 .008.72.008 1.6L0 14.4c0 .88.712 1.6 1.592 1.6H11.2c.88 0 1.6-.72 1.6-1.6V4.8L8 0zm1.6 12.8H3.2v-1.6h6.4v1.6zm0-3.2H3.2V8h6.4v1.6zm-2.4-4V1.2l4.4 4.4H7.2z" />

    </main>
  </body>
</html>
