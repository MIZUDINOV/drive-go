<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive GO — Chrome Web Store Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Unbounded:wght@500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-canvas search-focus-shot" aria-label="Chrome Web Store Promo — Drive GO">
      <!-- background orbs -->
      <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
      <div class="bg-orb bg-orb-b" aria-hidden="true"></div>
      <div class="bg-orb bg-orb-c" aria-hidden="true"></div>
      <section class="search-focus-stage" aria-label="Drive GO search panel">
        <div class="focus-copy" aria-hidden="true">
          <p class="hero-kicker">Feature 01 &bull; Smart Search</p>
          <h1>
            Instant<br />
            file and folder<br />
            search
          </h1>
          <p class="hero-subtitle">
            Search field and result panel
            work as one flow: filters,
            fast selection, relevant output.
          </p>
        </div>

        <div class="drive-search-mock focus-search" aria-hidden="true">
          <div class="drive-search-input-wrap is-3d">
            <span class="drive-search-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
                <path d="M20 20l-4.2-4.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
              </svg>
            </span>
            <span class="drive-search-input">report 2026</span>
            <button class="drive-search-clear-btn" type="button" aria-label="Clear search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
              </svg>
            </button>
          </div>

          <div class="drive-search-panel drive-search-panel-3d">
            <div class="drive-search-filters">
              <label class="drive-search-filter">
                <span>Type</span>
                <div class="drive-search-filter-type-trigger">
                  <span class="drive-search-filter-type-value">Documents</span>
                  <span class="material-symbols-rounded">expand_more</span>
                </div>
              </label>
              <label class="drive-search-filter">
                <span>Owner</span>
                <div class="drive-search-filter-type-trigger">
                  <span class="drive-search-filter-type-value">Me</span>
                  <span class="material-symbols-rounded">expand_more</span>
                </div>
              </label>
              <label class="drive-search-filter">
                <span>Modified</span>
                <div class="drive-search-filter-type-trigger">
                  <span class="drive-search-filter-type-value">30 days</span>
                  <span class="material-symbols-rounded">expand_more</span>
                </div>
              </label>
            </div>

            <div class="drive-search-results">
              <div class="drive-search-listbox">
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon doc"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Final Report Q1 2026</span>
                    <span class="drive-search-result-meta">You • 03/14/2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon sheet"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Marketing Budget 2026</span>
                    <span class="drive-search-result-meta">You • 03/11/2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon pdf"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Contract_2026_signed.pdf</span>
                    <span class="drive-search-result-meta">Team • 03/07/2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon media"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Demo walkthrough.mp4</span>
                    <span class="drive-search-result-meta">You • 03/02/2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon doc"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Release Plan 2026.docx</span>
                    <span class="drive-search-result-meta">Team • 02/28/2026</span>
                  </span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
