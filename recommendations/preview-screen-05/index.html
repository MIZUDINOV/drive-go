<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drive GO — Chrome Web Store Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Unbounded:wght@500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="preview-canvas search-focus-shot" aria-label="Промо Chrome Web Store — Drive GO">
      <!-- background orbs -->
      <div class="bg-orb bg-orb-a" aria-hidden="true"></div>
      <div class="bg-orb bg-orb-b" aria-hidden="true"></div>
      <div class="bg-orb bg-orb-c" aria-hidden="true"></div>
      <section class="search-focus-stage" aria-label="Панель поиска Drive GO">
        <div class="focus-copy" aria-hidden="true">
          <p class="hero-kicker">Функция 01 &bull; Умный поиск</p>
          <h1>
            Мгновенный<br />
            поиск файлов<br />
            и папок
          </h1>
          <p class="hero-subtitle">
            Поле поиска и панель результатов
            работают в одном потоке: фильтры,
            быстрый выбор и релевантная выдача.
          </p>
        </div>

        <div class="drive-search-mock focus-search" aria-hidden="true">
          <div class="drive-search-input-wrap is-3d">
            <span class="drive-search-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
                <path d="M20 20l-4.2-4.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
              </svg>
            </span>
            <span class="drive-search-input">отчет 2026</span>
            <button class="drive-search-clear-btn" type="button" aria-label="Очистить поиск">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"></path>
              </svg>
            </button>
          </div>

          <div class="drive-search-panel drive-search-panel-3d">
            <div class="drive-search-filters">
              <label class="drive-search-filter">
                <span>Тип</span>
                <div class="drive-search-filter-type-trigger">
                  <span class="drive-search-filter-type-value">Документы</span>
                  <span class="material-symbols-rounded">expand_more</span>
                </div>
              </label>
              <label class="drive-search-filter">
                <span>Владелец</span>
                <div class="drive-search-filter-type-trigger">
                  <span class="drive-search-filter-type-value">Я</span>
                  <span class="material-symbols-rounded">expand_more</span>
                </div>
              </label>
              <label class="drive-search-filter">
                <span>Изменено</span>
                <div class="drive-search-filter-type-trigger">
                  <span class="drive-search-filter-type-value">30 дней</span>
                  <span class="material-symbols-rounded">expand_more</span>
                </div>
              </label>
            </div>

            <div class="drive-search-results">
              <div class="drive-search-listbox">
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon doc"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Финальный отчет Q1 2026</span>
                    <span class="drive-search-result-meta">Вы • 14.03.2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon sheet"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Бюджет маркетинга 2026</span>
                    <span class="drive-search-result-meta">Вы • 11.03.2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon pdf"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Договор_2026_signed.pdf</span>
                    <span class="drive-search-result-meta">Команда • 07.03.2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon media"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">Скринкаст_демо.mp4</span>
                    <span class="drive-search-result-meta">Вы • 02.03.2026</span>
                  </span>
                </button>
                <button class="drive-search-result-item">
                  <span class="drive-search-result-icon"><span class="inline-icon doc"></span></span>
                  <span class="drive-search-result-main">
                    <span class="drive-search-result-name">План релиза 2026.docx</span>
                    <span class="drive-search-result-meta">Команда • 28.02.2026</span>
                  </span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
